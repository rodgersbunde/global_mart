version: 2

models:
  - name: stg_orders
    description: "Cleaned orders staging model with generated surrogate keys"

    columns:
      - name: order_id
        description: "Unique identifier for each order"
        tests:
          - not_null
          - unique

      - name: order_date
        description: "Date when order was placed"
        tests:
          - not_null

      - name: product_id
        description: "Surrogate key for product"
        tests:
          - not_null

      - name: region_id
        description: "Surrogate key for region"
        tests:
          - not_null

      - name: state_id
        description: "Surrogate key for state"
        tests:
          - not_null

      - name: category_id
        description: "Surrogate key for category"
        tests:
          - not_null

      - name: subcategory_id
        description: "Surrogate key for subcategory"
        tests:
          - not_null

      - name: sales
        description: "Sales amount"
        tests:
          - not_null

      - name: quantity
        description: "Quantity sold"
        tests:
          - not_null

      - name: profit
        description: "Profit generated"